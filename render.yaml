services:
  - type: web
    name: newpt-system-backend
    env: node
    repo: https://github.com/anomalyco/NewPTsystem-backend
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://newptsystem-619-frontend.vercel.app
    healthCheckPath: /api/health
    autoDeploy: true
